name: backend-ci

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Compile (skip tests)
        run: mvn -B -ntp -DskipTests compile

      - name: Run tests
        run: mvn -B -ntp test

      - name: Run checkstyle
        run: mvn -B -ntp checkstyle:check

      - name: Check service layer structure
        run: bash scripts/check-service-structure.sh

      - name: Check HTTP method constraints
        run: bash scripts/check-http-method-constraints.sh
